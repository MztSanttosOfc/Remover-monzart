<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ISOLAMENTO OBRIGATÓRIO -->
<meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
<meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">

<title>Remover Fundo</title>

<style>
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  background:#fff;
}
.container{
  max-width:480px;
  margin:auto;
  padding:20px;
  text-align:center;
}
.display{
  min-height:260px;
  border:2px dashed #ddd;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:20px 0;
  background:#f8f9fa;
}
img{
  max-width:100%;
  max-height:320px;
  border-radius:8px;
}
.loader{
  width:110px;
  height:110px;
  border:6px solid #eee;
  border-top:6px solid #000;
  border-radius:50%;
  animation:spin 1s linear infinite;
  position:relative;
}
.loader span{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
  font-size:14px;
}
@keyframes spin{to{transform:rotate(360deg)}}
button,label{
  display:block;
  width:100%;
  padding:14px;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
  border:none;
}
label{background:#eee}
button{background:#000;color:#fff;margin-top:10px}
</style>
</head>

<body>
<div class="container">
  <label>
    Escolher imagem
    <input type="file" id="file" hidden accept="image/*">
  </label>

  <div class="display" id="display">
    <span>Imagem aparece aqui</span>
  </div>

  <button id="btn" style="display:none">Remover fundo</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/dist/index.umd.js"></script>

<script>
const fileInput = document.getElementById('file');
const display = document.getElementById('display');
const btn = document.getElementById('btn');

let file;

fileInput.onchange = e=>{
  file = e.target.files[0];
  if(!file) return;
  display.innerHTML = `<img src="${URL.createObjectURL(file)}">`;
  btn.style.display='block';
};

btn.onclick = async ()=>{
  display.innerHTML = `<div class="loader"><span>Aguarde</span></div>`;
  btn.style.display='none';

  const result = await window.imglyRemoveBackground(file,{
    publicPath:"https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/dist/"
  });

  const url = URL.createObjectURL(result);
  display.innerHTML = `<img src="${url}">`;
};
</script>
</body>
</html>
